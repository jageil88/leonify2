name: Build Leonify APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev cmake
      - name: pip
        run: pip install buildozer==1.5.0 cython==0.29.33
      - name: build
        run: buildozer android debug
        timeout-minutes: 60
      - uses: actions/upload-artifact@v4
        with:
          name: leonify-apk
          path: bin/*.apk
