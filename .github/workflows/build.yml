name: Build Leonify APK
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev cmake build-essential

      - name: Setup Android SDK licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/repositories.cfg
          yes | sudo $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | sudo $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-33" 2>/dev/null || true

      - name: Install buildozer
        run: pip install buildozer==1.5.0 cython==0.29.33

      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: buildozer android debug
        timeout-minutes: 60

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: leonify-apk
          path: bin/*.apk
