name: Build Leonify APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev libltdl-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Build APK
        run: buildozer android debug
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: leonify-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: build-log
          path: "*.log"
